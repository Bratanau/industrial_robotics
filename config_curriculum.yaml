behaviors:
  GFSX_Brain:
    trainer_type: ppo
    hyperparameters:
      batch_size: 2048
      buffer_size: 40960
      learning_rate: 0.00025
      beta: 0.005
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: true
      hidden_units: 256
      num_layers: 2
      memory:
        sequence_length: 64
        memory_size: 256
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    keep_checkpoints: 10
    max_steps: 40000000
    time_horizon: 1000
    summary_freq: 20000

# =====================================================================
# CURRICULUM POR RECOMPENSA (measure: reward)
# ---------------------------------------------------------------------
# threshold = recompensa media por episodio necesaria para avanzar.
# El exito (pelota entre las garras) vale +5, asi que threshold 5.0
# significa "la mayoria de episodios terminan en exito" = fase dominada.
#
# CRITICO: los TRES parametros deben tener los MISMOS name y los MISMOS
# completion_criteria. ML-Agents avanza cada parametro por separado; si
# difieren, se desincronizan (la pelota se aleja pero los obstaculos
# siguen fijos, o al reves).
#
# min_lesson_length: 400 episodios sostenidos. Con 4 envs x 8 arenas
# = 32 agentes, valores bajos se cumplen en segundos y las fases pasan
# volando sin haberse dominado.
#
# NOTA: el yaml se relee en cada --resume y NO requiere Build.
# =====================================================================

environment_parameters:

  # --- Parametro 1: Distancia maxima de la pelota ---
  ball_max_forward:
    curriculum:
      - name: Phase0_Close_Fixed
        completion_criteria:
          measure: reward
          behavior: GFSX_Brain
          threshold: 5.0
          min_lesson_length: 400
          require_reset: true
        value: 1.2
      - name: Phase1_Close_Random
        completion_criteria:
          measure: reward
          behavior: GFSX_Brain
          threshold: 5.0
          min_lesson_length: 400
          require_reset: true
        value: 1.2
      - name: Phase2_Mid_Fixed
        completion_criteria:
          measure: reward
          behavior: GFSX_Brain
          threshold: 5.5
          min_lesson_length: 400
          require_reset: true
        value: 1.9
      - name: Phase3_Mid_Random
        completion_criteria:
          measure: reward
          behavior: GFSX_Brain
          threshold: 5.5
          min_lesson_length: 400
          require_reset: true
        value: 1.9
      - name: Phase4_Far_Fixed
        completion_criteria:
          measure: reward
          behavior: GFSX_Brain
          threshold: 6.0
          min_lesson_length: 400
          require_reset: true
        value: 2.6
      - name: Phase5_Far_Random
        completion_criteria:
          measure: reward
          behavior: GFSX_Brain
          threshold: 6.0
          min_lesson_length: 400
          require_reset: true
        value: 2.6
      - name: Phase6_Sim2Real_Final
        value: 2.6

  # --- Parametro 2: Modo de Obstaculos (0 = Fijo, 1 = Random) ---
  obstacle_mode:
    curriculum:
      - name: Phase0_Close_Fixed
        completion_criteria:
          measure: reward
          behavior: GFSX_Brain
          threshold: 5.0
          min_lesson_length: 400
          require_reset: true
        value: 0
      - name: Phase1_Close_Random
        completion_criteria:
          measure: reward
          behavior: GFSX_Brain
          threshold: 5.0
          min_lesson_length: 400
          require_reset: true
        value: 1
      - name: Phase2_Mid_Fixed
        completion_criteria:
          measure: reward
          behavior: GFSX_Brain
          threshold: 5.5
          min_lesson_length: 400
          require_reset: true
        value: 0
      - name: Phase3_Mid_Random
        completion_criteria:
          measure: reward
          behavior: GFSX_Brain
          threshold: 5.5
          min_lesson_length: 400
          require_reset: true
        value: 1
      - name: Phase4_Far_Fixed
        completion_criteria:
          measure: reward
          behavior: GFSX_Brain
          threshold: 6.0
          min_lesson_length: 400
          require_reset: true
        value: 0
      - name: Phase5_Far_Random
        completion_criteria:
          measure: reward
          behavior: GFSX_Brain
          threshold: 6.0
          min_lesson_length: 400
          require_reset: true
        value: 1
      - name: Phase6_Sim2Real_Final
        value: 1

  # --- Parametro 3: Ruido Sim2Real (0 = Off, 1 = On) ---
  # Se activa solo en la ultima fase: primero que aprenda limpio,
  # luego se endurece para el traspaso al hardware.
  sim2real_noise:
    curriculum:
      - name: Phase0_Close_Fixed
        completion_criteria:
          measure: reward
          behavior: GFSX_Brain
          threshold: 5.0
          min_lesson_length: 400
          require_reset: true
        value: 0
      - name: Phase1_Close_Random
        completion_criteria:
          measure: reward
          behavior: GFSX_Brain
          threshold: 5.0
          min_lesson_length: 400
          require_reset: true
        value: 0
      - name: Phase2_Mid_Fixed
        completion_criteria:
          measure: reward
          behavior: GFSX_Brain
          threshold: 5.5
          min_lesson_length: 400
          require_reset: true
        value: 0
      - name: Phase3_Mid_Random
        completion_criteria:
          measure: reward
          behavior: GFSX_Brain
          threshold: 5.5
          min_lesson_length: 400
          require_reset: true
        value: 0
      - name: Phase4_Far_Fixed
        completion_criteria:
          measure: reward
          behavior: GFSX_Brain
          threshold: 6.0
          min_lesson_length: 400
          require_reset: true
        value: 0
      - name: Phase5_Far_Random
        completion_criteria:
          measure: reward
          behavior: GFSX_Brain
          threshold: 6.0
          min_lesson_length: 400
          require_reset: true
        value: 0
      - name: Phase6_Sim2Real_Final
        value: 1
        
  episode_length:
