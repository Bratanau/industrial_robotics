      - name: Phase2_Mid_Fixed
        completion_criteria:
          measure: reward
          behavior: GFSX_Brain
          threshold: 5.5
          min_lesson_length: 400
          require_reset: true
        value: 1800
      - name: Phase3_Mid_Random
        completion_criteria:
          measure: reward
          behavior: GFSX_Brain
          threshold: 5.5
          min_lesson_length: 400
          require_reset: true
        value: 1800
      - name: Phase4_Far_Fixed
        completion_criteria:
          measure: reward
          behavior: GFSX_Brain
